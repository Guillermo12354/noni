<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Galaxia de Memorias | Te Amo</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@1,400;1,700&display=swap" rel="stylesheet">
</head>
<body>

<div id="welcome-screen">
    <div class="heart-container">
        <img src="https://i.pinimg.com/originals/29/57/f7/2957f7c7d2ef62de281dac2765bb7acb.gif" alt="Corazón" class="heart-gif">
    </div>
    <h1 id="start-button">MUA</h1>
    <p class="subtitle">Mi amor por ti es del tamaño del universo</p>
</div>

<canvas id="stars-canvas"></canvas>

<div id="galaxy-scene">
    <img src="https://i.pinimg.com/originals/29/57/f7/2957f7c7d2ef62de281dac2765bb7acb.gif" id="galaxy-heart-static" style="position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); width:150px; z-index:1; pointer-events:none;">
</div>

<div id="master-container"></div>

<div id="memory-modal" class="modal">
    <div class="modal-overlay"></div>
    <div class="modal-content">
        <span class="close-button">&times;</span>
        <div class="modal-body">
            <div class="modal-image-container">
                <img id="modal-image" src="" alt="Foto de recuerdo">
            </div>
            <p id="modal-text" class="neon-text-body"></p>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
